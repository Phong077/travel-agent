<style>
        /* Glassmorphism Utilities */
        .glass-card {

            scrollbar-width: none;
        }
        
        /* Smooth Accordion Transition */
        .accordion-content {
            transition: max-height 0.3s ease-out, padding 0.3s ease, opacity 0.3s ease;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        .accordion-content.expanded {
            max-height: 1000px; /* arbitrary large value */
            opacity: 1;

        }

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggles = document.querySelectorAll('.accordion-toggle');
            
            toggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const content = toggle.nextElementSibling;
                    const icon = toggle.querySelector('.icon-rotate');
                    const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
                    
                    // Optional: Close others (Accordion behavior)
                    // toggles.forEach(t => {
                    //     if (t !== toggle) {
                    //         t.setAttribute('aria-expanded', 'false');
                    //         t.nextElementSibling.classList.remove('expanded');
                    //         t.querySelector('.icon-rotate').classList.remove('expanded-icon');
                    //         t.parentElement.classList.replace('bg-white/50', 'bg-white/30');
                    //     }
                    // });

                    if (!isExpanded) {
                        toggle.setAttribute('aria-expanded', 'true');
                        content.classList.add('expanded');
                        icon.classList.add('expanded-icon');
                        toggle.parentElement.classList.replace('bg-white/30', 'bg-white/50');
                    } else {
                        toggle.setAttribute('aria-expanded', 'false');
                        content.classList.remove('expanded');
                        icon.classList.remove('expanded-icon');
                        toggle.parentElement.classList.replace('bg-white/50', 'bg-white/30');
                    }
                });
            });
        });
    </script>
