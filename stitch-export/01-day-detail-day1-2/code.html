<style>

            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

<div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">

<article class="glass-card rounded-xl p-lg flex flex-col md:flex-row gap-md relative group hover:shadow-[0_10px_30px_rgba(0,0,0,0.04)] transition-all duration-300">

<span class="text-label-sm font-label-sm text-on-surface-variant whitespace-nowrap">上午 09:00</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-sm">
<div>

<span class="material-symbols-outlined text-primary" data-icon="wb_sunny">wb_sunny</span>

                                </h3>
<p class="text-body-md font-body-md text-on-surface-variant mt-1">金阁寺与日式庭园</p>

                            </span>
