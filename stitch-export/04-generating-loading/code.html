<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .mesh-bg {
            background: radial-gradient(at 0% 0%, hsla(243,100%,75%,0.3) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, hsla(200,100%,75%,0.3) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, hsla(243,100%,75%,0.3) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(200,100%,75%,0.3) 0px, transparent 50%);
            background-color: #f8f9ff;
        }

        .skeleton-shimmer {
            background: #d3e4fe;
            background-image: linear-gradient(to right, #d3e4fe 0%, #eff4ff 20%, #d3e4fe 40%, #d3e4fe 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%; 
            animation-duration: 2s;
            animation-fill-mode: forwards; 
            animation-iteration-count: infinite;
            animation-name: placeholderShimmer;
            animation-timing-function: linear;
        }

        @keyframes placeholderShimmer {
            0% {
                background-position: -468px 0;
            }
            100% {
                background-position: 468px 0; 
            }
        }

        .ai-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(79, 70, 229, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
            }
        }

        .fade-text-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        
        .fade-text-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 500ms, transform 500ms;
        }
        
        .fade-text-exit {
            opacity: 1;
            transform: translateY(0);
        }
        
        .fade-text-exit-active {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 500ms, transform 500ms;
        }
    </style>

<script>
        const loadingTexts = [
            "正在检索四川旅行知识库...",
            "正在分析预算...",
            "正在搜寻最佳航班...",
            "正在挑选高分酒店...",
            "正在优化行程路线...",
            "即将完成，请稍候..."
        ];

        const textElement = document.getElementById('loading-text');
        const progressBar = document.getElementById('progress-bar');
        let currentIndex = 0;
        let progress = 0;

        function updateLoadingState() {
            // Text Rotation
            textElement.style.opacity = '0';
            textElement.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % loadingTexts.length;
                textElement.innerText = loadingTexts[currentIndex];
                textElement.style.transform = 'translateY(10px)';
                
                setTimeout(() => {
                    textElement.style.opacity = '1';
                    textElement.style.transform = 'translateY(0)';
                }, 50);
            }, 500);

            // Progress Bar Logic (simulated)
            if (progress < 95) {
                progress += (95 - progress) * 0.15; // Ease towards 95%
                progressBar.style.width = `${progress}%`;
            }
        }

        setInterval(updateLoadingState, 2500);

        // Initial progress kickstart
        setTimeout(() => {
             progressBar.style.width = '15%';
             progress = 15;
        }, 100);
    </script>
