spring.application.name=travel-agent

# Do not paste your key here. Set it in PowerShell:
# $env:DASHSCOPE_API_KEY="your-api-key"
spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY:}
spring.ai.dashscope.chat.options.model=${DASHSCOPE_MODEL:qwen-plus}
amap.api-key=${AMAP_API_KEY:}
amap.weather.enabled=${AMAP_WEATHER_ENABLED:true}
dashscope.embedding.base-url=${DASHSCOPE_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
dashscope.embedding.model=${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
dashscope.embedding.dimensions=${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
rag.vector-store.enabled=${RAG_VECTOR_STORE_ENABLED:false}
rag.vector-store.jdbc-url=${RAG_VECTOR_STORE_JDBC_URL:jdbc:postgresql://localhost:5432/travel_agent}
rag.vector-store.username=${RAG_VECTOR_STORE_USERNAME:travel_agent}
rag.vector-store.password=${RAG_VECTOR_STORE_PASSWORD:travel_agent}
server.port=8092
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
logging.level.com.example.travelagent.application.TravelPlanningService=DEBUG
logging.level.com.example.travelagent.agent.TravelAgentTools=INFO
