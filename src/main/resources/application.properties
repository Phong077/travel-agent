spring.application.name=travel-agent

# Do not paste your key here. Set it in PowerShell:
# $env:DASHSCOPE_API_KEY="your-api-key"
spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY:}
spring.ai.dashscope.chat.options.model=${DASHSCOPE_MODEL:qwen-plus}
server.port=8092
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
logging.level.com.example.travelagent.application.TravelPlanningService=DEBUG
logging.level.com.example.travelagent.agent.TravelAgentTools=INFO
