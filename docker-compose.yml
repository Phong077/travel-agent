services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8092:8092"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "5173:80"
